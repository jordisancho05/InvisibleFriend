name: CI

# Runs the validations on every pull request to master and on every push to
# master (post-merge). Trigger it by hand from the Actions tab too.
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

# The suite needs no secrets and no network (SMTP is mocked, config uses temp
# files), so read-only access to the repo is enough.
permissions:
  contents: read

# A newer commit on the same branch/PR cancels the in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project + dev tools
        run: python -m pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check --output-format=github .

      - name: Ruff (format check)
        run: ruff format --check .

      - name: Mypy (types)
        run: mypy src

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project + dev tools
        run: python -m pip install -e ".[dev]"

      - name: Pytest (with coverage)
        run: pytest --cov=invisible_friend --cov-report=term-missing
